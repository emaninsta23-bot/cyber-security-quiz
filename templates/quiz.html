<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ week_name }} – Quiz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f1117;
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .topbar {
    background: #1a1f2e;
    border-bottom: 1px solid #1e2740;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .topbar a {
    color: #60a5fa;
    text-decoration: none;
    font-size: 0.85rem;
  }
  .topbar a:hover { text-decoration: underline; }
  .topbar .sep { color: #334155; }
  .topbar .title { font-weight: 600; font-size: 0.9rem; color: #e2e8f0; }
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 24px;
  }
  .card {
    background: #1a1f2e;
    border: 1px solid #1e2740;
    border-radius: 16px;
    padding: 36px 40px;
    max-width: 700px;
    width: 100%;
  }

  /* Loading */
  #loading { text-align: center; padding: 60px 0; color: #64748b; }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid #1e2740;
    border-top-color: #60a5fa;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Progress */
  .progress-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    font-size: 0.8rem;
    color: #64748b;
  }
  .progress-bar-wrap {
    flex: 1;
    height: 4px;
    background: #1e2740;
    border-radius: 2px;
    margin: 0 12px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #60a5fa, #a78bfa);
    border-radius: 2px;
    transition: width 0.4s;
  }

  /* Score badge */
  .score-badge {
    display: inline-block;
    background: rgba(96, 165, 250, 0.1);
    color: #60a5fa;
    border: 1px solid rgba(96, 165, 250, 0.2);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 0.78rem;
    font-weight: 600;
  }

  /* Question */
  #question-text {
    font-size: 1.1rem;
    font-weight: 600;
    line-height: 1.6;
    color: #f1f5f9;
    margin-bottom: 28px;
  }

  /* Options */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option-btn {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 18px;
    background: #0f1117;
    border: 1px solid #1e2740;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
    color: #e2e8f0;
    font-size: 0.9rem;
    line-height: 1.5;
  }
  .option-btn:hover:not(:disabled) {
    border-color: #60a5fa;
    background: rgba(96, 165, 250, 0.05);
  }
  .option-btn .key {
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: 28px;
    height: 28px;
    background: #1e2740;
    border-radius: 6px;
    font-size: 0.8rem;
    font-weight: 700;
    color: #94a3b8;
    flex-shrink: 0;
    margin-top: 1px;
    transition: all 0.15s;
  }
  .option-btn.correct {
    border-color: #22c55e;
    background: rgba(34, 197, 94, 0.08);
  }
  .option-btn.correct .key {
    background: #22c55e;
    color: #fff;
  }
  .option-btn.wrong {
    border-color: #ef4444;
    background: rgba(239, 68, 68, 0.08);
  }
  .option-btn.wrong .key {
    background: #ef4444;
    color: #fff;
  }
  .option-btn.missed {
    border-color: #22c55e;
    background: rgba(34, 197, 94, 0.05);
    opacity: 0.8;
  }
  .option-btn.missed .key {
    background: rgba(34, 197, 94, 0.3);
    color: #22c55e;
  }
  .option-btn:disabled { cursor: default; }

  /* Feedback */
  #feedback {
    margin-top: 20px;
    padding: 14px 18px;
    border-radius: 10px;
    font-size: 0.88rem;
    line-height: 1.6;
    display: none;
  }
  #feedback.correct-fb {
    background: rgba(34, 197, 94, 0.08);
    border: 1px solid rgba(34, 197, 94, 0.2);
    color: #86efac;
  }
  #feedback.wrong-fb {
    background: rgba(239, 68, 68, 0.07);
    border: 1px solid rgba(239, 68, 68, 0.2);
    color: #fca5a5;
  }
  #feedback .fb-label {
    font-weight: 700;
    margin-bottom: 4px;
  }
  #feedback .correct-explain {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid rgba(255,255,255,0.07);
    color: #86efac;
  }

  /* Next button */
  #next-btn {
    display: none;
    margin-top: 20px;
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #3b82f6, #6366f1);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  #next-btn:hover { opacity: 0.9; }

  /* Results */
  #results { display: none; }
  .result-header { text-align: center; padding: 20px 0 28px; }
  .result-score {
    font-size: 3.5rem;
    font-weight: 800;
    background: linear-gradient(90deg, #60a5fa, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .result-label { color: #64748b; font-size: 0.9rem; margin-top: 6px; }
  .result-msg { font-size: 1.05rem; margin-top: 12px; color: #e2e8f0; }
  .review-list { margin-top: 24px; display: flex; flex-direction: column; gap: 10px; }
  .review-item {
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 0.85rem;
    line-height: 1.5;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .review-item.pass {
    background: rgba(34, 197, 94, 0.06);
    border: 1px solid rgba(34, 197, 94, 0.15);
  }
  .review-item.fail {
    background: rgba(239, 68, 68, 0.06);
    border: 1px solid rgba(239, 68, 68, 0.15);
  }
  .review-item .icon { flex-shrink: 0; font-size: 1rem; margin-top: 1px; }
  .review-item .q-text { color: #94a3b8; }
  .review-item .ans-text {
    margin-top: 3px;
    font-size: 0.8rem;
    color: #64748b;
  }
  .review-item .ans-text span { font-weight: 600; }
  .retry-btn {
    display: block;
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #3b82f6, #6366f1);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    margin-top: 24px;
    transition: opacity 0.15s;
    text-align: center;
    text-decoration: none;
  }
  .retry-btn:hover { opacity: 0.9; }
  .home-btn {
    display: block;
    width: 100%;
    padding: 12px;
    background: transparent;
    border: 1px solid #1e2740;
    border-radius: 10px;
    color: #94a3b8;
    font-size: 0.9rem;
    cursor: pointer;
    margin-top: 10px;
    transition: all 0.15s;
    text-align: center;
    text-decoration: none;
  }
  .home-btn:hover { border-color: #60a5fa; color: #60a5fa; }

  @media (max-width: 520px) {
    .card { padding: 24px 20px; }
    #question-text { font-size: 1rem; }
  }
</style>
</head>
<body>
<div class="topbar">
  <a href="/">Home</a>
  <span class="sep">›</span>
  <span class="title">{{ week_name }}</span>
</div>

<div class="main">
  <div class="card" id="quiz-card">

    <!-- Loading -->
    <div id="loading">
      <div class="spinner"></div>
      <p>Loading questions...</p>
    </div>

    <!-- Question -->
    <div id="question-panel" style="display:none;">
      <div class="progress-row">
        <span id="q-num">1 / 5</span>
        <div class="progress-bar-wrap">
          <div class="progress-bar" id="progress-bar" style="width:0%"></div>
        </div>
        <span class="score-badge" id="score-badge">Score: 0</span>
      </div>
      <div id="question-text"></div>
      <div class="options" id="options"></div>
      <div id="feedback"></div>
      <button id="next-btn" onclick="nextQuestion()">Next Question &rarr;</button>
    </div>

    <!-- Results -->
    <div id="results">
      <div class="result-header">
        <div class="result-score" id="result-score">0/0</div>
        <div class="result-label">Questions Correct</div>
        <div class="result-msg" id="result-msg"></div>
      </div>
      <div class="review-list" id="review-list"></div>
      <button class="retry-btn" onclick="startQuiz()">Try Again</button>
      <a href="/" class="home-btn">Back to Home</a>
    </div>

  </div>
</div>

<script>
const WEEK_ID = {{ week_id }};
let currentQuestion = null;

async function startQuiz() {
  document.getElementById("loading").style.display = "block";
  document.getElementById("question-panel").style.display = "none";
  document.getElementById("results").style.display = "none";

  const url = WEEK_ID === -1 ? "/api/start/all" : `/api/start/${WEEK_ID}`;
  await fetch(url);
  document.getElementById("loading").style.display = "none";
  document.getElementById("question-panel").style.display = "block";
  loadQuestion();
}

async function loadQuestion() {
  const res = await fetch("/api/question");
  const data = await res.json();

  if (data.done) {
    showResults(data);
    return;
  }

  currentQuestion = data;
  document.getElementById("q-num").textContent = `${data.number} / ${data.total}`;
  document.getElementById("progress-bar").style.width = `${((data.number - 1) / data.total) * 100}%`;
  document.getElementById("question-text").textContent = data.question;

  const opts = document.getElementById("options");
  opts.innerHTML = "";
  for (const [key, text] of Object.entries(data.options)) {
    const btn = document.createElement("button");
    btn.className = "option-btn";
    btn.innerHTML = `<span class="key">${key}</span><span>${text}</span>`;
    btn.onclick = () => submitAnswer(key);
    opts.appendChild(btn);
  }

  document.getElementById("feedback").style.display = "none";
  document.getElementById("next-btn").style.display = "none";
}

async function submitAnswer(answer) {
  const buttons = document.querySelectorAll(".option-btn");
  buttons.forEach(b => b.disabled = true);

  const res = await fetch("/api/answer", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({answer})
  });
  const data = await res.json();

  document.getElementById("score-badge").textContent = `Score: ${data.score}`;

  // Colour the buttons
  buttons.forEach(btn => {
    const key = btn.querySelector(".key").textContent;
    if (key === data.correct_answer) {
      btn.classList.add("correct");
    } else if (key === answer && !data.correct) {
      btn.classList.add("wrong");
    }
  });

  // Show feedback
  const fb = document.getElementById("feedback");
  if (data.correct) {
    fb.className = "correct-fb";
    fb.innerHTML = `<div class="fb-label">Correct!</div>${data.explanation}`;
  } else {
    fb.className = "wrong-fb";
    let html = `<div class="fb-label">Incorrect</div>`;
    if (data.wrong_explanation) html += `${data.wrong_explanation}`;
    if (data.explanation) {
      html += `<div class="correct-explain"><strong>Correct answer:</strong> ${data.explanation}</div>`;
    }
    fb.innerHTML = html;
  }
  fb.style.display = "block";

  const nextBtn = document.getElementById("next-btn");
  if (data.answered >= data.total) {
    nextBtn.textContent = "See Results";
  } else {
    nextBtn.textContent = "Next Question →";
  }
  nextBtn.style.display = "block";
}

function nextQuestion() {
  if (currentQuestion && currentQuestion.number >= currentQuestion.total) {
    fetchResults();
  } else {
    loadQuestion();
  }
}

async function fetchResults() {
  const res = await fetch("/api/results");
  const data = await res.json();
  showResults(data);
}

function showResults(data) {
  document.getElementById("question-panel").style.display = "none";
  document.getElementById("results").style.display = "block";

  const pct = data.total > 0 ? Math.round((data.score / data.total) * 100) : 0;
  document.getElementById("result-score").textContent = `${data.score}/${data.total}`;

  let msg = "";
  if (pct >= 90) msg = "Excellent! You have mastered this topic.";
  else if (pct >= 70) msg = "Great work! A few more reviews and you'll be there.";
  else if (pct >= 50) msg = "Good effort. Review the explanations and try again.";
  else msg = "Keep studying — go through the material and retry.";
  document.getElementById("result-msg").textContent = msg;

  // Review list
  const list = document.getElementById("review-list");
  list.innerHTML = "";
  if (data.answers) {
    data.answers.forEach(a => {
      const item = document.createElement("div");
      item.className = `review-item ${a.is_correct ? "pass" : "fail"}`;
      item.innerHTML = `
        <span class="icon">${a.is_correct ? "✓" : "✗"}</span>
        <div>
          <div class="q-text">${a.question}</div>
          <div class="ans-text">
            Your answer: <span>${a.selected}</span>
            ${!a.is_correct ? ` &nbsp;|&nbsp; Correct: <span style="color:#86efac">${a.correct}</span>` : ""}
          </div>
        </div>
      `;
      list.appendChild(item);
    });
  }
}

// Start on load
startQuiz();
</script>
</body>
</html>
