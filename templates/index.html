<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Security Quiz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f1117;
    color: #e2e8f0;
    min-height: 100vh;
  }
  .hero {
    background: linear-gradient(135deg, #1a1f2e 0%, #0f1117 100%);
    border-bottom: 1px solid #1e2740;
    padding: 48px 24px 40px;
    text-align: center;
  }
  .hero h1 {
    font-size: 2.2rem;
    font-weight: 700;
    background: linear-gradient(90deg, #60a5fa, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 10px;
  }
  .hero p {
    color: #94a3b8;
    font-size: 1rem;
  }
  .container { max-width: 860px; margin: 0 auto; padding: 40px 24px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }
  .card {
    background: #1a1f2e;
    border: 1px solid #1e2740;
    border-radius: 12px;
    padding: 24px;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    display: block;
  }
  .card:hover {
    border-color: #60a5fa;
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(96, 165, 250, 0.15);
  }
  .card-badge {
    display: inline-block;
    background: rgba(96, 165, 250, 0.15);
    color: #60a5fa;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 4px;
    margin-bottom: 10px;
  }
  .card h3 {
    font-size: 0.95rem;
    font-weight: 600;
    color: #e2e8f0;
    line-height: 1.4;
    margin-bottom: 8px;
  }
  .card .meta {
    font-size: 0.8rem;
    color: #64748b;
  }
  .all-card {
    background: linear-gradient(135deg, #1a1f2e, #1e1a40);
    border: 1px solid #4f46e5;
    border-radius: 12px;
    padding: 24px 32px;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
  }
  .all-card:hover {
    border-color: #818cf8;
    box-shadow: 0 8px 24px rgba(99, 102, 241, 0.2);
    transform: translateY(-2px);
  }
  .all-card .left h2 {
    font-size: 1.1rem;
    color: #a78bfa;
    margin-bottom: 4px;
  }
  .all-card .left p { color: #64748b; font-size: 0.85rem; }
  .all-card .arrow { font-size: 1.5rem; color: #a78bfa; }
  .section-title {
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #475569;
    margin-bottom: 16px;
  }
</style>
</head>
<body>
<div class="hero">
  <h1>Cyber Security Quiz</h1>
  <p>Test your knowledge across all weeks of the module</p>
</div>
<div class="container">
  <a href="/quiz/all" class="all-card">
    <div class="left">
      <h2>Practice All Weeks</h2>
      <p>{{ weeks | sum(attribute='count') }} questions from every topic, randomised</p>
    </div>
    <div class="arrow">&#8594;</div>
  </a>

  <div class="section-title">Select a Week</div>
  <div class="grid">
    {% for week in weeks %}
    <a href="/quiz/{{ week.id }}" class="card">
      <div class="card-badge">Week</div>
      <h3>{{ week.name }}</h3>
      <div class="meta">{{ week.count }} questions</div>
    </a>
    {% endfor %}
  </div>
</div>
</body>
</html>
